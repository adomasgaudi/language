<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lithuanian finance v0.1.18 — Tartaglia deck</title>
<!--
  Self-contained port of the "language" repo's Tartaglia learning app.
  One file, no build, no network. Teaches the Lithuanian financial terms used
  in the vz repo's Data Explorer (the Įmonės-analizei columns, MONEY_COLS and
  the Finansai sub-tab): apyvarta, spėjamos pajamos, grynasis pelnas, DU
  sąnaudos, …  Learning direction: Lithuanian -> English.

  Engine is faithful to app/src/engine: manual interval slider (cube-root
  bands), heat-coloured memory map, dot->crystal growth, freshness curve,
  localStorage progress with export/import. Audio uses the browser's
  Lithuanian speech synthesis when available (no recordings shipped).
-->
<style>
  :root{
    --bg:#09090b; --panel:rgba(24,24,27,.7); --panel-solid:#18181b;
    --line:#27272a; --line2:#3f3f46;
    --t50:#fafafa; --t100:#f4f4f5; --t200:#e4e4e7; --t300:#d4d4d8;
    --t400:#a1a1aa; --t500:#71717a; --t600:#52525b;
    --sky:#38bdf8; --sky300:#7dd3fc; --sky400:#38bdf8; --sky500:#0ea5e9;
    --rose:#fb7185; --outline:#8b8b93; --knob:#52606e; --knob-edge:#6b7785; --ok:#34d399;
  }
  body.light{
    --bg:#dcdfe6; --panel:rgba(255,255,255,.82); --panel-solid:#ffffff;
    --line:#c8ccd4; --line2:#b4bac4;
    --t50:#0b0b0d; --t100:#1a1a1f; --t200:#27272a; --t300:#3f3f46;
    --t400:#52525b; --t500:#71717a; --t600:#a1a1aa;
    --sky:#0ea5e9; --sky300:#0284c7; --sky400:#0ea5e9; --sky500:#0ea5e9;
    --rose:#e11d48; --outline:#9aa0ab; --knob:#cbd2da; --knob-edge:#aeb6c0; --ok:#059669;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--t200);
    font:14px/1.45 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  /* comfortable side margin, sections breathe a little */
  .wrap{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:10px;padding:14px 14px 28px;min-height:100%}
  header{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
  h1{font-size:18px;font-weight:700;color:var(--t50);margin:0;letter-spacing:-.01em}
  .sub{font-size:11px;color:var(--t500);margin:2px 0 0}
  .stat{font-size:11px;color:var(--t500);white-space:nowrap;display:flex;gap:5px;align-items:center}
  .stat .due{font-weight:700;color:var(--sky300)} .stat .sep{color:var(--t600)}
  .row{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
  button{font-family:inherit;cursor:pointer;border:0;color:inherit}
  .pill{background:var(--line);color:var(--t300);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500}
  .pill.on{background:var(--sky500);color:#fff}
  .pill.danger:hover{background:var(--rose);color:#fff}
  .pill:hover{filter:brightness(1.12)}
  /* header card */
  .headcard{padding:12px 14px}
  .headtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .headmain{display:flex;align-items:center;gap:10px;min-width:0}
  .ver{font-size:11px;font-weight:700;color:var(--t400);font-variant-numeric:tabular-nums;background:var(--line);padding:2px 8px;border-radius:999px}
  /* segmented mode control */
  .seg{display:inline-flex;background:var(--line);border-radius:9px;padding:2px;gap:2px}
  .segbtn{border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--t400);background:transparent;white-space:nowrap}
  .segbtn.on{background:var(--sky500);color:#fff} .segbtn:hover:not(.on){color:var(--t200)}
  .settings{padding:8px;margin-top:2px}
  /* floating history fab + popup */
  .histfab{position:fixed;right:14px;bottom:14px;z-index:50;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .fab{width:42px;height:42px;border-radius:999px;background:var(--sky500);color:#fff;font-size:18px;box-shadow:0 6px 18px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
  .fab:hover{filter:brightness(1.1)} .fab:active{transform:scale(.94)}
  .hist.pop{order:-1;max-width:300px;max-height:55vh;overflow:auto;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .card,.box{border:1px solid var(--line);background:var(--panel);border-radius:14px}
  .card{padding:12px 14px;box-shadow:0 6px 18px rgba(0,0,0,.3)}
  /* card spans full width; swipe left/right to navigate */
  .cardwrap{display:block}
  .cardwrap .card{touch-action:pan-y}
  .side{background:var(--line);color:var(--t300);display:flex;align-items:center;justify-content:center}
  .side:hover{background:var(--line2)} .side:active{transform:scale(.96)}
  .side.back{width:30px;height:30px;font-size:18px;border-radius:8px}
  /* deck-picker cards */
  .deckcard{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:14px 16px;box-shadow:0 6px 18px rgba(0,0,0,.3)}
  .deckcard:hover{border-color:var(--sky500)} .deckcard:active{transform:scale(.99)}
  .dtitle{font-size:17px;font-weight:700;color:var(--t50)}
  .dsub{font-size:12px;color:var(--t500);margin-top:2px}
  .dstat{display:flex;gap:14px;margin-top:8px;font-size:12px;color:var(--t500)}
  .dstat .due{color:var(--sky300);font-weight:600}
  .meta{display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:12px;color:var(--t500);margin-bottom:2px}
  .meta .k{text-transform:uppercase;letter-spacing:.04em}
  .acts{display:flex;align-items:center;gap:2px}
  .cardbtn{background:transparent;color:var(--t500);font-size:12px;padding:2px 6px;border-radius:6px}
  .cardbtn:hover{background:var(--line);color:var(--t200)}
  .cardbtn.del:hover{color:var(--rose)}
  .prompt{min-height:64px;padding:6px 0;text-align:center}
  .term{font-size:28px;font-weight:600;line-height:1.15;color:var(--t50)}
  .from{margin-top:3px;font-size:12px;color:var(--t500)}
  .hidden-face{color:var(--t500)}
  .hidden-face .eye{font-size:28px}
  .audio{display:flex;justify-content:center;gap:6px;margin-top:2px}
  .abtn{background:var(--line);color:var(--t200);border-radius:8px;padding:5px 12px;font-size:13px}
  .abtn:hover{background:var(--line2)}
  .answer{margin-top:8px;border-top:1px solid var(--line);padding-top:8px;text-align:center}
  .natural{font-size:18px;color:var(--t100);font-weight:600}
  .syn{font-size:13px;color:var(--ok);margin-top:4px;line-height:1.4}
  .literal{font-size:13px;color:var(--t400);margin-top:5px;line-height:1.4}
  .gloss{font-size:12px;color:var(--t500);margin-top:4px;font-style:italic}
  .flexbadge{display:inline-block;margin-top:8px;font-size:10px;font-weight:700;letter-spacing:.02em;padding:3px 9px;border-radius:6px}
  .flexbadge.flex{background:color-mix(in srgb,var(--ok) 18%,transparent);color:var(--ok)}
  .flexbadge.exact{background:var(--line);color:var(--t400)}
  .show{display:flex;align-items:center;justify-content:center;width:100%;min-height:64px;border:1px solid var(--line2);border-radius:10px;padding:8px 20px;font-size:15px;font-weight:600;color:var(--t300);background:transparent}
  .show:hover{background:var(--line)} .show:active{transform:scale(.99)}
  /* three bare "slide-to-open" knobs — chosen time sits on the thumb, tight stack */
  .sliders{display:flex;flex-direction:column;gap:5px;margin:1px 0 5px}
  .srow{position:relative;opacity:.6;transition:opacity .2s ease}
  .srow.active{opacity:1}
  .knobval{position:absolute;top:0;height:28px;width:24px;display:flex;align-items:center;justify-content:center;
    transform:translateX(-50%);pointer-events:none;font-size:10px;font-weight:700;color:#1a1a1f;font-variant-numeric:tabular-nums}
  input.knob{-webkit-appearance:none;appearance:none;width:100%;height:28px;border-radius:9999px;margin:0;touch-action:none;cursor:grab;
    background:var(--line);border:1px solid var(--line2);outline:none}
  .srow.active input.knob{background:linear-gradient(90deg,rgba(56,189,248,.42),rgba(56,189,248,.10));border-color:var(--sky500)}
  input.knob:active{cursor:grabbing}
  input.knob::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:9999px;
    background:var(--knob);border:2px solid var(--knob-edge);box-shadow:0 2px 5px rgba(0,0,0,.4)}
  .srow.active input.knob::-webkit-slider-thumb{background:#fff;border-color:var(--sky400)}
  input.knob::-moz-range-thumb{width:24px;height:24px;border:2px solid var(--knob-edge);border-radius:9999px;background:var(--knob);box-shadow:0 2px 5px rgba(0,0,0,.4)}
  .srow.active input.knob::-moz-range-thumb{background:#fff;border-color:var(--sky400)}
  input.knob::-webkit-slider-runnable-track{height:28px;border-radius:9999px;background:transparent}
  input.knob::-moz-range-track{height:28px;border-radius:9999px;background:transparent}
  /* sliders on the left, a column of action buttons on the right */
  .sliderwrap{display:flex;gap:8px;align-items:stretch}
  .sliderwrap .sliders{flex:1;min-width:0;margin:0}
  .actcol{display:flex;flex-direction:column;gap:5px;width:88px;flex:0 0 auto}
  .actbtn{flex:1;border-radius:8px;font-size:12px;font-weight:700;color:#fff;min-height:28px}
  .actbtn:active{transform:scale(.97)}
  .actbtn.commit{background:var(--sky500)} .actbtn.commit:hover{background:var(--sky400)}
  .actbtn.forgot{background:#b45309} .actbtn.forgot:hover{filter:brightness(1.1)}
  .actbtn.new{background:var(--line2);color:var(--t100)} .actbtn.new:hover{filter:brightness(1.12)}
  .maplabel{font-size:11px;color:var(--t500);margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .sortbtn{background:var(--line);color:var(--t300);border-radius:7px;padding:3px 8px;font-size:11px;font-weight:600;white-space:nowrap}
  .sortbtn:hover{filter:brightness(1.12)}
  .map{display:flex;flex-wrap:wrap;align-items:flex-start;gap:5px 6px;padding:4px 0}
  .dot{display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent}
  /* every shape gets the SAME fixed clickable box, so selecting never moves the layout */
  .shapebox{position:relative;display:grid;place-items:center;width:26px;height:26px;border-radius:8px}
  .shapebox.cur{background:color-mix(in srgb,var(--sky500) 14%,transparent)}
  .dot:hover .shapebox{background:color-mix(in srgb,var(--sky500) 8%,transparent)}
  .dot .glyph{display:block}
  .dotnum{font-size:9px;line-height:1;font-weight:600;color:var(--t500);font-variant-numeric:tabular-nums}
  .dotnum.cur{color:var(--sky300);font-weight:700}
  .dot .ring{position:absolute;inset:2px;border-radius:9999px;border:1.5px solid var(--sky300);box-sizing:border-box;pointer-events:none}
  footer{margin-top:auto;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--t600);padding-top:4px}
  footer button{color:var(--t600);background:transparent}
  footer button:hover{color:var(--t400)}
  .empty{border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:40px;text-align:center;color:var(--t400)}
  textarea{width:100%;height:80px;resize:none;border-radius:6px;background:#0a0a0b;border:1px solid var(--line);color:var(--t200);padding:8px;font-size:12px;font-family:ui-monospace,monospace}
  .apply{margin-top:6px;background:var(--sky500);color:#fff;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600}
  .flash{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--t100);color:#18181b;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .legtoggle{background:transparent;color:var(--t600);font-size:10px;padding:0}
  .legtoggle:hover{color:var(--t400)}
  .legend{font-size:10px;color:var(--t600);line-height:1.5;margin-top:3px}
  .legend b{color:var(--t400);font-weight:600}
  footer .ver{color:var(--t400);font-weight:600;font-variant-numeric:tabular-nums}
  .hist{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:10px 12px;font-size:11px}
  .histhead{color:var(--t400);font-weight:600;margin-bottom:6px}
  .histrow{display:flex;gap:8px;align-items:baseline;padding:2px 0;color:var(--t500)}
  .histrow .hv{color:var(--sky300);font-weight:600;font-variant-numeric:tabular-nums;min-width:42px}
  .histrow .hn{flex:1;color:var(--t400)}
  .histrow .hs{color:var(--t600);white-space:nowrap}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
"use strict";
/* ============================================================================
 * VERSION LOG — one continuous counter, bumped on every update/deploy (vz
 * BULD-02). Newest first; story points = effort, not LOC (BULD-03). The top
 * entry's `v` drives the <title> and the footer badge.
 * ==========================================================================*/
const VERSIONS = [
  {v:'0.1.18',sp:1,   note:'Fixed-size clickable shape boxes (selecting no longer shifts the map); side prev/next replaced by swipe left/right on the card'},
  {v:'0.1.17',sp:1,   note:'Narrower sliders + right-hand column of Commit / Forgot / New buttons (all commit for now)'},
  {v:'0.1.16',sp:0.5, note:'Slimmer review knobs (28px track / 24px thumb) and tighter spacing between them'},
  {v:'0.1.15',sp:7,   note:'Synonyms + flexible/exact badge on vocab cards; Auto-due mode (per-shape thresholds); review "Both" toggle; settings ⚙ menu; header card; version top + floating history; numbers below shapes; LT-specific job terms kept in Lithuanian; embedded progress snapshot'},
  {v:'0.1.14',sp:4,   note:'3 personalised decks (teacher job, fitness clients, website clients — Vilnius, researched); numbered shapes to track cards across re-sorts'},
  {v:'0.1.13',sp:3,   note:'Intro deck-picker + 2nd deck (advanced rekvizitai finance, 30 cards); thin grey outline on shapes; legacy progress migrated'},
  {v:'0.1.12',sp:1.5, note:'Download/Upload progress as readable JSON; brighter white/yellow glow; greyer light-theme bg'},
  {v:'0.1.11',sp:0.5, note:'Per-shape colour caps: triangle→orange, hexagon→white, circle/star→blue'},
  {v:'0.1.10',sp:1,   note:'Strip slider labels/ticks/header; chosen time rides on the thumb; knobs 10px apart'},
  {v:'0.1.9', sp:0.5, note:'Round knob intervals to 20s/1m/5m/10m/30m · 10m/30m/4h/12h/48h · 12h/48h/5d/14d/30d'},
  {v:'0.1.8', sp:2,   note:'Compact one-view layout: halved margins, prev/next on sides, hide+delete atop card, crammed dots & knobs, collapsible key'},
  {v:'0.1.7', sp:1,   note:'Simplify map to 4 shapes: triangle/hexagon/circle, JWST 4-point star at 1mo+'},
  {v:'0.1.6', sp:4,   note:'3 log-step knobs · sort by due/longevity/topic · light theme · map above card · softer glow · new=outline · full-width Show'},
  {v:'0.1.5', sp:0.5, note:'Sizes 10–15px; ring the current bubble with a 25px circle'},
  {v:'0.1.4', sp:1,   note:'Version badge + 📋 SP history log'},
  {v:'0.1.3', sp:1.5, note:'Remember UI choices in cache across reloads/redeploys'},
  {v:'0.1.2', sp:3,   note:'Memory map: shape = longevity, dimmer glow, 10px cap'},
  {v:'0.1.1', sp:0.5, note:'Cap memory-map dots at 20px'},
  {v:'0.1.0', sp:5,   note:'Lithuanian finance deck — Tartaglia SRS, 34 vz terms'},
];
const VERSION = VERSIONS[0].v;
document.title = 'Lithuanian finance v' + VERSION;

/* ============================================================================
 * CONTENT — Lithuanian financial terms from the vz Data Explorer.
 * [lithuanian, english(natural), literal/note, pronunciation, tier]
 * Tiers: obvious (cognate) | easy | mid | hard
 * ==========================================================================*/
// ---- Deck 1: Data Explorer basics (the original deck) ----------------------
// Tuple: [lt, primary EN, note(definition + ≠ distinctions), pronunciation, tier, synonyms(all count)]
const UNITS_CORE = [
  { id:'U1', title:'Pajamos ir apyvarta · Revenue & turnover', cards:[
    ['Apyvarta','turnover','Total sales value incl. pass-through (e.g. media ad spend). The dashboard’s "Turnover (apyvarta)". ≠ spėjamos pajamos (fee income only).','ah-pih-VAR-tah','mid','gross turnover · sales · (loosely) revenue'],
    ['Pajamos','income / revenue','General word for money coming in; context picks the exact sense. ≠ apyvarta (specifically turnover).','pah-YAH-mos','mid','income · revenue · earnings · proceeds'],
    ['Spėjamos pajamos','estimated revenue (fee income)','Fee income, pass-through excluded — the dashboard’s "Revenue (spėjamos pajamos)". ≠ apyvarta (turnover, includes pass-through).','SPAY-yah-mos pah-YAH-mos','hard','projected revenue · estimated income · fee income'],
    ['Pardavimo pajamos','sales revenue','Revenue from sales — the P&L top line. ≈ pajamos in most contexts.','par-DAH-vih-mo pah-YAH-mos','hard','sales · revenue from sales · net sales'],
    ['Apyvartos pokytis','turnover change (%)','Year-on-year % change in turnover.','ah-pih-VAR-tos POH-kih-tis','mid','change in turnover · turnover growth'],
  ]},
  { id:'U2', title:'Pelnas ir sąnaudos · Profit & costs', cards:[
    ['Pelnas','profit','Generic profit. Add a qualifier for precision: grynasis = net, bendrasis = gross, prieš mokesčius = pre-tax.','PEL-nas','easy','earnings · gain · income (profit sense)'],
    ['Grynasis pelnas','net profit','Profit after ALL costs and tax (the bottom line). ≠ gross profit (before opex) and ≠ pre-tax profit (before tax).','grih-NAH-sis PEL-nas','mid','net income · net earnings · profit after tax · bottom line'],
    ['Nuostoliai','losses','Negative result; the opposite of pelnas. A negative net result = net loss.','noo-OST-oh-lyay','hard','loss · net loss · deficit'],
    ['Sąnaudos','costs / expenses','General costs. ≠ savikaina (specifically cost of sales).','SAW-now-dos','mid','costs · expenses · expenditure · outlays'],
    ['DU sąnaudos','wage costs','DU = darbo užmokestis. Salaries plus related employer costs.','DEH-OO SAW-now-dos','hard','payroll costs · labour costs · staff costs · personnel costs'],
    ['Ne-atlyginimų sąnaudos','non-salary costs','All costs except wages.','neh-at-lih-GIH-nih-moo SAW-now-dos','hard','non-wage costs · non-payroll costs'],
    ['Pelno mokestis','corporate income tax','Tax on company profit. ≠ PVM (VAT, a sales tax).','PEL-no MOH-kes-tis','mid','corporate tax · profit tax · CIT'],
  ]},
  { id:'U3', title:'Atlyginimai ir darbuotojai · Pay & employees', cards:[
    ['Atlyginimas','salary / pay','What an employee is paid. ≈ darbo užmokestis in everyday use.','at-lih-GIH-nih-mas','mid','salary · wage · pay · remuneration'],
    ['Atlyginimų vidurkis','average salary','','at-lih-GIH-nih-moo VEE-door-kis','mid','mean salary · average pay'],
    ['Darbo užmokestis','wages / payroll','Formal term for remuneration; ≈ atlyginimas. As a company cost it’s DU sąnaudos.','DAR-bo OO-zhmo-kes-tis','hard','wages · pay · remuneration · salary'],
    ['Darbuotojai','employees','','dar-boo-OH-toy-yay','mid','staff · workers · workforce · personnel'],
    ['Darbuotojų skaičius','number of employees','','dar-boo-oh-TOH-yoo SKY-choos','mid','headcount · staff count · employee count'],
    ['Vidurkis','average','','VEE-door-kis','easy','mean'],
    ['Pokytis','change (%)','Year-on-year delta.','POH-kih-tis','easy','change · variance · delta'],
  ]},
  { id:'U4', title:'Mokesčiai, skolos, rizika · Tax, debt & risk', cards:[
    ['Mokestis','tax','Generic tax; specify pelno (profit) or PVM (VAT).','MOH-kes-tis','easy','tax · duty · levy'],
    ['PVM','VAT','pridėtinės vertės mokestis — a sales/consumption tax. ≠ pelno mokestis (profit tax).','PEH-VEH-EM','obvious','value-added tax'],
    ['Skola','debt','What is owed. The formal balance-sheet term is įsipareigojimai.','SKOH-lah','easy','debt · amount owed · (loosely) liability'],
    ['Skola Sodrai','social-security debt','Owed to Sodra. ≠ skola VMI (tax debt).','SKOH-lah SOD-rye','mid','debt to Sodra · social-security arrears'],
    ['Sodra','State Social Insurance Fund','The payroll-tax / pension body.','SOD-rah','mid','social security (LT) · SoDra'],
    ['Kredito rizika','credit risk','','KREH-dih-to RIH-zih-kah','obvious','default risk'],
    ['Rizika','risk','','RIH-zih-kah','obvious','hazard · exposure'],
    ['Įmonė','company','','im-oh-NEH','easy','firm · business · enterprise'],
    ['Metai','year','','MEH-tye','easy','year'],
    ['Veikla','activity / line of business','What the firm does.','VAYK-lah','mid','operations · business activity · line of business'],
  ]},
  { id:'U5', title:'Rizikos lygiai · Credit-risk levels', cards:[
    ['Žemiausia','lowest','Best credit standing; superlative of žema (low).','zheh-MYOW-sya','hard','very lowest · minimum'],
    ['Žema','low','','ZHEH-mah','mid','low'],
    ['Vidutinė','medium','','vih-doo-TIH-neh','mid','moderate · average · medium'],
    ['Aukšta','high','','OWK-shtah','mid','high'],
    ['Aukščiausia','highest','Worst credit standing; superlative of aukšta (high).','owk-SHCHOW-sya','hard','very highest · maximum'],
  ]},
];

// ---- Deck 2: Advanced finance — rekvizitai financial statements & credit ----
// Mined from the vz initial data (rek_tabs.json Finansai/Skolos/Įmonė tabs):
// balance-sheet, P&L and creditworthiness line items. No simple words.

// Build a deck's cards once, with globally-unique ids (deck-prefixed).
function buildDeckCards(deck){
  if(deck._cards) return deck._cards;
  const out=[];
  deck.units.forEach(u => u.cards.forEach((c,i)=> out.push({
    id: deck.id+':'+u.id+'-'+(i+1), deck: deck.id, unit: u.title,
    target:c[0], natural:c[1], literal:c[2], gloss:c[3], tier:c[4], also:c[5]||'',
  })));
  deck._cards=out; return out;
}

/* ============================================================================
 * ENGINE — manual SRS (ported from app/src/engine/srs.ts & interval.ts)
 * ==========================================================================*/
const MINUTE_MS = 60000;
const now = () => Date.now();
const clamp = (x,lo,hi)=> x<lo?lo : x>hi?hi : x;
const cbrt = Math.cbrt;

function newRecord(){ return {status:'new',due:0,last:null,interval:0,reps:0,lapses:0}; }
function isDue(r,t){ return r.status==='new' || t>=r.due; }
function statusAt(r,t){ return r.last===null ? 'new' : (t>=r.due?'due':'scheduled'); }
function commitInterval(r,minutes,t){
  const interval = Math.max(0,minutes);
  const wasOverdue = r.last!==null && t>=r.due;
  return {status:'scheduled',last:t,due:t+interval*MINUTE_MS,interval,reps:r.reps+1,lapses:r.lapses+(wasOverdue?1:0)};
}
function freshness(r,t){
  if(r.last===null || r.interval<=0) return 0;
  const f = 1 - (t-r.last)/(r.interval*MINUTE_MS);
  return f<0?0:f>1?1:f;
}

const BANDS = [
  {id:'short',label:'minutes',lo:0.5,hi:30},
  {id:'mid',label:'hours',lo:10,hi:2880},

];
// Each knob snaps to 5 fixed, rounded intervals (no free choice) so reviews
// land on tidy times instead of scattering. Values are in minutes. 3×5 = 15 stops.
const STEPS=5;
const BAND_STEPS = [

  [10, 30, 240, 720, 2880],          // 10m · 30m · 4h · 12h · 48h
  [720, 2880, 7200, 20160, 43200],   // 12h · 48h · 5d · 14d · 30d
];
function formatMinutes(m){
  if(m<1) return Math.round(m*60)+'s';
  if(m<60) return Math.round(m)+'m';
  if(m<=2880){ const h=m/60; return (h<10?h.toFixed(h%1?1:0):Math.round(h))+'h'; } // hours up to 48h
  const d=m/1440; return (d<10?d.toFixed(d%1?1:0):Math.round(d))+'d';
}
function dueLabel(m,t){
  const due=new Date(t+m*MINUTE_MS), sameDay=new Date(t).toDateString()===due.toDateString();
  return sameDay
    ? due.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
    : due.toLocaleDateString([], {month:'short',day:'numeric'});
}

/* memory map.
 *   COLOUR  = freshness (forgetting curve): bright blue just-reviewed -> white
 *             -> orange -> coal as it fades.
 *   SHAPE   = longevity / interval band, simplified to four:
 *             triangle <30m · hexagon <2d · circle <1mo · 4-point star 1mo+.
 *   SIZE    = position within the band, 10px (just entered) -> 15px. */
const SIZE_MIN=10, SIZE_MAX=15;
const GLOW_AT=0.55; // yellow/white/blue shine; cooler/brighter = bigger glow
const HEAT=[[1,[77,166,255]],[0.8,[235,245,255]],[0.6,[255,214,92]],[0.4,[255,138,30]],[0.2,[229,57,53]],[0,[58,42,42]]];

// Longevity bands, smallest interval first. `peak` caps how bright/cool the
// freshness colour can get: triangles top out at orange, hexagons at brilliant
// white, circles & stars reach full blue — so longer-held words glow cooler.
const SHAPE_BANDS=[
  {shape:'triangle', lo:0,     hi:30,       peak:0.4}, // up to 30 min · max orange
  {shape:'hexagon',  lo:30,    hi:2880,     peak:0.8}, // 30 min – 2 d  · max white
  {shape:'circle',   lo:2880,  hi:43200,    peak:1.0}, // 2 d – 1 mo    · up to blue
  {shape:'star',     lo:43200, hi:Infinity, peak:1.0}, // 1 mo +        · up to blue
];
function bandFor(m){
  for(const b of SHAPE_BANDS) if(m<b.hi) return b;
  return SHAPE_BANDS[SHAPE_BANDS.length-1];
}
// 5px at the band's low edge -> 10px at its high edge (cube-root spaced).
function bandSize(b,m){
  const L=b.lo<=0?0.5:b.lo;
  const H=(b.hi===Infinity)?L*64:b.hi;
  const span=cbrt(H)-cbrt(L);
  const t=span<=0?1:clamp((cbrt(Math.max(m,L))-cbrt(L))/span,0,1);
  return SIZE_MIN+(SIZE_MAX-SIZE_MIN)*t;
}
function heatColor(f){
  const x=clamp(f,0,1);
  for(let i=0;i<HEAT.length-1;i++){
    const [hi,chi]=HEAT[i], [lo,clo]=HEAT[i+1];
    if(x<=hi && x>=lo){
      const t=hi===lo?0:(x-lo)/(hi-lo);
      const r=Math.round(clo[0]+(chi[0]-clo[0])*t), g=Math.round(clo[1]+(chi[1]-clo[1])*t), b=Math.round(clo[2]+(chi[2]-clo[2])*t);
      return `rgb(${r}, ${g}, ${b})`;
    }
  }
  const last=HEAT[HEAT.length-1][1]; return `rgb(${last[0]}, ${last[1]}, ${last[2]})`;
}
// CSS clip-path for a regular N-gon, point up.
function polyClip(sides){
  const pts=[];
  for(let i=0;i<sides;i++){
    const a=-Math.PI/2 + i*2*Math.PI/sides;
    pts.push((50+50*Math.cos(a)).toFixed(2)+'% '+(50+50*Math.sin(a)).toFixed(2)+'%');
  }
  return 'polygon('+pts.join(', ')+')';
}
// 4-point sparkle (JWST-style): outer points up/right/down/left, thin inner waist.
function starClip(){
  const R=50, r=13, pts=[];
  for(let i=0;i<8;i++){
    const a=-Math.PI/2 + i*Math.PI/4, rad=(i%2===0)?R:r;
    pts.push((50+rad*Math.cos(a)).toFixed(2)+'% '+(50+rad*Math.sin(a)).toFixed(2)+'%');
  }
  return 'polygon('+pts.join(', ')+')';
}
// Resolve a band's shape name to a CSS clip-path ('' => plain circle).
function clipFor(shape){
  if(shape==='triangle') return polyClip(3);
  if(shape==='hexagon')  return polyClip(6);
  if(shape==='star')     return starClip();
  return ''; // circle
}
function dotStyle(rec,t){
  const isNew=rec.status==='new';
  const f=freshness(rec,t);
  const due=!isNew && t>=rec.due;
  const b=bandFor(rec.interval);
  const cf=f*b.peak;             // peak colour capped by longevity band
  return {
    shape:b.shape, clip:clipFor(b.shape),
    diameter:bandSize(b,rec.interval), color:heatColor(cf),
    isNew,                       // new = hollow outline, no fill
    due, glow:(!isNew && cf>=GLOW_AT) ? cf : 0, // 0 or the freshness driving the glow size
  };
}

function modeFrom(o){ return ['order','scroll','auto'].includes(o&&o.mode) ? o.mode : ((o&&o.freeScroll)?'scroll':'order'); }
function loadState(){
  let o=null;
  try{ const raw=localStorage.getItem(KEY); if(raw) o=JSON.parse(raw); }catch(e){}
  // Apply the embedded progress snapshot ONCE — when its stamp differs from what's stored.
  if(!o || o.seedStamp!==SEED.stamp){
    const s=SEED.settings||{};
    return {
      records:JSON.parse(JSON.stringify(SEED.records)), deleted:(SEED.deleted||[]).slice(), purged:(SEED.purged||[]).slice(),
      seedStamp:SEED.stamp, deckId:(o&&o.deckId)||null,
      mode: s.freeScroll?'scroll':'order', hideTarget:!!s.hideTarget, showBoth:false,
      bandIndex:1, sortMode:['due','longevity','topic'].includes(s.sortMode)?s.sortMode:'due',
      theme:s.theme==='light'?'light':'dark',
    };
  }
  // Normal load + migrate legacy single-deck ids (U1-1 -> d1:U1-1).
  const fix = k => /^U\d/.test(k) ? 'd1:'+k : k;
  const recs={}; for(const k in (o.records||{})) recs[fix(k)]=o.records[k];
  return {
    records:recs, deleted:(o.deleted||[]).map(fix), purged:(o.purged||[]).map(fix),
    seedStamp:o.seedStamp, deckId:o.deckId||null,
    mode:modeFrom(o), hideTarget:!!o.hideTarget, showBoth:!!o.showBoth,
    bandIndex:Number.isInteger(o.bandIndex)?o.bandIndex:1,
    sortMode:['due','longevity','topic'].includes(o.sortMode)?o.sortMode:'due',
    theme:o.theme==='light'?'light':'dark',
  };
}

function speak(text){
  if(!('speechSynthesis' in window)){ flash('No speech support on this device'); return; }
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='lt-LT'; u.rate=0.9;
    const v=(window.speechSynthesis.getVoices()||[]).find(v=>/lt/i.test(v.lang));
    if(v) u.voice=v;
    else flash('No Lithuanian voice installed — using default');
    window.speechSynthesis.speak(u);
  }catch(e){ flash('Could not play audio'); }
}

// --- Auto-due mode -----------------------------------------------------------
// A scheduled card becomes eligible to surface once its freshness remaining drops
// past a per-shape threshold: triangle ≤50% left, hexagon ≤75% left, circle/star
// only when cold (0% left / fully due). If nothing scheduled is eligible, fall
// back to new cards. Within the eligible set, coldest (most-due) first.
function autoThreshold(rec){
  const sh=bandFor(rec.interval).shape;
  if(sh==='triangle') return 0.50;
  if(sh==='hexagon')  return 0.75;
  return 0; // circle & star: only when freshness hits 0 (cold/black)
}
function autoOrder(t){
  const vis=visibleCards();
  const fresh=c=>freshness(recordFor(c.id),t);
  const sched=vis.filter(c=>recordFor(c.id).status!=='new');
  const eligible=sched.filter(c=>fresh(c) <= autoThreshold(recordFor(c.id))+1e-9).sort((a,b)=>fresh(a)-fresh(b));
  const news=vis.filter(c=>recordFor(c.id).status==='new');
  const rest=sched.filter(c=>!eligible.includes(c)).sort((a,b)=>fresh(a)-fresh(b));
  return [...eligible, ...news, ...rest]; // most-due first, then new, then not-yet-ready
}
function autoCurrent(t){
  if(S.pick){ const c=visibleCards().find(x=>x.id===S.pick); if(c) return c; }
  const o=autoOrder(t); return o.length?o[0]:null;
}
function pool(t){ return S.mode==='scroll' ? visibleCards() : dueCards(t); }
function current(t){
  if(S.mode==='auto') return autoCurrent(t);
  const p = S.mode==='scroll' ? visibleCards() : dueCards(t);
  if(!p.length) return null; if(S.idx>=p.length) S.idx=0; if(S.idx<0) S.idx=p.length-1; return p[S.idx];
}
// Navigate prev/next, honouring the active mode.
function go(delta){
  if(S.mode==='auto'){
    const t=now(), o=autoOrder(t); if(!o.length) return;
    const cur=autoCurrent(t); let i=Math.max(0,o.findIndex(x=>cur&&x.id===cur.id));
    i=(i+delta+o.length)%o.length; S.pick=o[i].id;
  } else { S.idx+=delta; }
  S.revealed=false; render();
}

// Order for the memory map. due: soonest-due first (new cards count as due now);
// longevity: shortest interval first; topic: original unit/deck order.
function sortCards(cards,t){
  const arr=cards.slice();
  if(S.sortMode==='due') arr.sort((a,b)=>dueKey(recordFor(a.id),t)-dueKey(recordFor(b.id),t));
  else if(S.sortMode==='longevity') arr.sort((a,b)=>recordFor(a.id).interval-recordFor(b.id).interval);
  // 'topic' keeps CARDS' natural unit order
  return arr;
}
function dueKey(rec,t){ return rec.status==='new' ? t : rec.due; }

function flash(msg){
  S.flashMsg=msg; render();
  if(S.flashTimer) clearTimeout(S.flashTimer);
  S.flashTimer=setTimeout(()=>{ S.flashMsg=null; render(); },2000);

function el(tag,props,...kids){
  const n=document.createElement(tag);
  if(props) for(const k in props){
    if(k==='style' && typeof props[k]==='object') Object.assign(n.style,props[k]);
    else if(k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(),props[k]);
    else if(k==='class') n.className=props[k];
    else if(k==='html') n.innerHTML=props[k];
    else n.setAttribute(k,props[k]);
  }
  for(const kid of kids.flat()) if(kid!=null && kid!==false) n.append(kid.nodeType?kid:document.createTextNode(kid));
  return n;
}

     No labels, no ticks, no header. The last-touched knob is the choice. */
  if(cur){
    const chosen=()=>BAND_STEPS[S.bandIndex][S.stepByBand[S.bandIndex]];
    const thumbLeft=(i)=>`calc((100% - 24px) * ${S.stepByBand[i]/(STEPS-1)} + 12px)`;
    const paintRow=(i)=>{ const lab=document.getElementById('kv'+i); if(lab){ lab.textContent=formatMinutes(BAND_STEPS[i][S.stepByBand[i]]); lab.style.left=thumbLeft(i); } };
    const setActive=(i)=>{ S.bandIndex=i; document.querySelectorAll('.srow').forEach((row,j)=>row.classList.toggle('active',j===i)); };
    const rows = BANDS.map((b,i)=>{
      const r=el('input',{type:'range',min:'0',max:String(STEPS-1),step:'1','aria-label':b.label+' interval',class:'knob'});
      r.value=String(S.stepByBand[i]);
      r.addEventListener('pointerdown',()=>{ if(S.bandIndex!==i) setActive(i); });
      r.addEventListener('input',e=>{
        S.stepByBand[i]=Number(e.target.value);
        if(S.bandIndex!==i) setActive(i);
        paintRow(i);
      });
      r.addEventListener('change',()=>saveState());
      const kv=el('span',{class:'knobval',id:'kv'+i}, formatMinutes(BAND_STEPS[i][S.stepByBand[i]]));
      kv.style.left=thumbLeft(i);
      return el('div',{class:'srow'+(i===S.bandIndex?' active':'')}, r, kv);
    });
    // all three buttons commit the chosen interval for now (Forgot/New reserved)
    const doCommit=(verb)=>{
      const mm=chosen();
      S.records[cur.id]=commitInterval(recordFor(cur.id),mm,now());
      saveState(); S.revealed=false; S.stepByBand=[2,2,2]; S.pick=null; // auto advances
      flash((verb||'Scheduled')+' · '+formatMinutes(mm));
    };
    app.append(el('div',{class:'card slider'},
      el('div',{class:'sliderwrap'},
        el('div',{class:'sliders'}, rows),
        el('div',{class:'actcol'},
          el('button',{class:'actbtn commit',onclick:()=>doCommit('Scheduled')},'Commit'),
          el('button',{class:'actbtn forgot',onclick:()=>doCommit('Forgot')},'Forgot'),
          el('button',{class:'actbtn new',onclick:()=>doCommit('New')},'New'),
        ),
      ),
    ));
  }

  function buildMap(cur,t,vis){
  const map=el('div',{class:'map'});
  const sorted=sortCards(vis,t);
  // stable 1-based number per card (deck order), so you can follow one as they re-sort
  const numOf={}; activeCards().forEach((c,i)=>numOf[c.id]=i+1);
  sorted.forEach(c=>{
    const rec=recordFor(c.id), s=dotStyle(rec,t), isCur=cur&&c.id===cur.id;
    // outer = thin grey rim (so shapes read apart); inner = the colour (or a
    // hole for new cards, leaving just the outline).
    const glyph=el('span',{class:'glyph'});
    Object.assign(glyph.style,{
      position:'relative',
      width:s.diameter+'px', height:s.diameter+'px', display:'block',
      background:'var(--outline)',
      clipPath:s.clip||'none', WebkitClipPath:s.clip||'none',
      borderRadius:s.shape==='circle'?'9999px':'1px',
      // brighter/cooler shapes shine more — doubled drop-shadow scaled by freshness
      filter:s.glow?(()=>{ const b=(4+(s.glow-GLOW_AT)*14).toFixed(1); return `drop-shadow(0 0 ${b}px ${s.color}) drop-shadow(0 0 ${(b/2).toFixed(1)}px ${s.color})`; })():'none',
      opacity:s.due?0.45:1, // faded when due, otherwise full
      transition:'filter .6s ease, opacity .6s ease, transform .2s ease',
    });
    const inner=el('span');
    Object.assign(inner.style,{
      position:'absolute', left:'50%', top:'50%', transform:'translate(-50%,-50%)',
      width:Math.max(s.diameter-2.5,2)+'px', height:Math.max(s.diameter-2.5,2)+'px',
      background:s.isNew?'var(--bg)':s.color, // new = hole (outline only)
      clipPath:s.clip||'none', WebkitClipPath:s.clip||'none',
      borderRadius:s.shape==='circle'?'9999px':'1px',
      transition:'background-color .6s ease',
    });
    glyph.append(inner);
    // shape sits in a FIXED-size box (ring fits inside it) so selecting never shifts layout
    const shapeBox=el('span',{class:'shapebox'+(isCur?' cur':'')}, glyph, isCur?el('span',{class:'ring'}):null);
    const num=el('span',{class:'dotnum'+(isCur?' cur':'')}, String(numOf[c.id]||''));
    const btn=el('button',{class:'dot',title:'#'+(numOf[c.id]||'')+' · '+c.target+' · '+s.shape+' · '+(s.due?'due':statusAt(rec,t)),
      onclick:()=>{
        if(S.mode==='auto'){ S.pick=c.id; S.revealed=false; render(); return; }
        const p = S.mode==='scroll' ? visibleCards() : dueCards(t);
        const i=p.findIndex(x=>x.id===c.id);
        if(i>=0){ S.idx=i; S.revealed=false; render(); } else flash('Not in this mode’s queue');
      }},
      shapeBox, num);
    map.append(btn);
  });
  const SORT_LABEL={due:'due date',longevity:'longevity',topic:'topic'};
  const SORT_NEXT={due:'longevity',longevity:'topic',topic:'due'};
  return el('div',null,
    el('div',{class:'maplabel'},
      el('span',null,'Memory map — colour = freshness · shape = longevity'),
      el('button',{class:'sortbtn',onclick:()=>{S.sortMode=SORT_NEXT[S.sortMode];saveState();render();}}, 'Sort: '+SORT_LABEL[S.sortMode]),
    ),
    map);
  }

  /* legend (collapsed by default to keep one-view) + footer */
  app.append(el('div',null,
    el('button',{class:'legtoggle',onclick:()=>{S.legendOpen=!S.legendOpen;render();}}, (S.legendOpen?'▾':'▸')+' key'),
    S.legendOpen ? el('div',{class:'legend',html:
      '<b>How to use:</b> read the term, guess, hit <b>Show meaning</b>, pick an interval, <b>Commit</b>. '+
      '<b>New cards</b> are a hollow outline; reviewed ones fill and cool toward their peak as the word sets. '+
      'Shape = longevity, and its peak colour grows cooler the longer you hold a word: '+
      '△ &lt;30m (max orange) · ⬡ &lt;2d (max white) · ○ &lt;1mo (blue) · ✦ 1mo+ (blue). Faded = due. Each knob snaps to 5 fixed intervals.'}) : null,
  ));

  if(S.deleted.length>0){
    app.append(el('footer',null,
      el('button',{onclick:()=>{S.deleted=[];saveState();render();}},'Restore '+S.deleted.length+' hidden'),
      el('span',null,''),
    ));
  }

  app.append(floatHistory());
  if(S.flashMsg) app.append(el('div',{class:'flash'}, S.flashMsg));
}

// Floating ⓘ history button + popup, fixed bottom-right (shared by both pages).
function floatHistory(){
  const wrap=el('div',{class:'histfab'});
  wrap.append(el('button',{class:'fab',title:'Version history',onclick:()=>{S.histOpen=!S.histOpen;render();}}, '📋'));
  if(S.histOpen){
    wrap.append(el('div',{class:'hist pop'},
      el('div',{class:'histhead'},'v'+VERSION+' · history · '+VERSIONS.reduce((a,e)=>a+e.sp,0)+' sp'),
      VERSIONS.map(e=>el('div',{class:'histrow'},
        el('span',{class:'hv'},'v'+e.v), el('span',{class:'hn'}, e.note), el('span',{class:'hs'}, e.sp+' sp'))),
    ));
  }
  return wrap;
}

function doExport(){
  const s=FMT+':'+btoa(unescape(encodeURIComponent(JSON.stringify({records:S.records,deleted:S.deleted,purged:S.purged}))));
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(s).then(()=>flash('Progress copied to clipboard'),()=>{S.importText=s;S.importOpen=true;flash('Copy this backup string');});
  } else { S.importText=s; S.importOpen=true; flash('Copy this backup string'); }
}
function doImport(){
  const s=S.importText.trim();
  try{
    if(!s.startsWith(FMT+':')) throw 0;
    const o=JSON.parse(decodeURIComponent(escape(atob(s.slice(FMT.length+1)))));
    S.records=o.records||{}; S.deleted=o.deleted||[]; S.purged=o.purged||[]; saveState();
    S.importOpen=false; S.importText=''; S.idx=0; flash('Progress imported');
  }catch(e){ flash('Import failed — incompatible string'); }
}

// Build a human-readable snapshot of everything you've learned/edited.
function buildSnapshot(){
  const reviewed=Object.keys(S.records).map(id=>{
    const r=S.records[id], c=cardById(id); if(!c||r.reps<1) return null; // only actually-reviewed
    return {
      id, deck:c.deck, lt:c.target, en:c.natural, tier:c.tier,
      reps:r.reps, lapses:r.lapses, status:statusAt(r,now()),
      interval:formatMinutes(r.interval), intervalMin:Math.round(r.interval),
      lastReviewed:r.last?new Date(r.last).toISOString():null,
      due:r.last?new Date(r.due).toISOString():null,
    };
  }).filter(Boolean).sort((a,b)=>b.reps-a.reps || b.intervalMin-a.intervalMin);
  return {
    app:'lt-finance-tartaglia', version:VERSION, exportedAt:new Date().toISOString(),
    settings:{theme:S.theme, sortMode:S.sortMode, mode:S.mode, hideTarget:S.hideTarget},
    counts:{total:allCards().length, reviewed:reviewed.length, hidden:S.deleted.length, deleted:S.purged.length},
    reviewed,
    hidden:S.deleted.map(id=>({id, lt:(cardById(id)||{}).target})),
    deleted:S.purged.map(id=>({id, lt:(cardById(id)||{}).target})),
    raw:{records:S.records, deleted:S.deleted, purged:S.purged},
  };
}
function doDownload(){
  try{
    const blob=new Blob([JSON.stringify(buildSnapshot(),null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='lt-finance-progress.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    flash('Downloaded progress JSON');
  }catch(e){ flash('Download failed'); }
}
function doUpload(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='application/json,.json';
  inp.addEventListener('change',()=>{
    const f=inp.files&&inp.files[0]; if(!f) return;
    const fr=new FileReader();
    fr.onload=()=>{
      try{
        const o=JSON.parse(fr.result), raw=o.raw||o; // accept rich snapshot or bare state
        S.records=raw.records||{}; S.deleted=raw.deleted||[]; S.purged=raw.purged||[];
        if(o.settings){ if(o.settings.theme)S.theme=o.settings.theme; if(o.settings.sortMode)S.sortMode=o.settings.sortMode; }
        S.idx=0; saveState(); render(); flash('Progress loaded from file');
      }catch(e){ flash('Upload failed — not a valid file'); }
    };
    fr.readAsText(f);
  });
  inp.click();
}

/* keyboard: Enter commits, Space reveals */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA') return;
  const cur=current(now()); if(!cur) return;
  if(e.key==='Enter'){ const mm=BAND_STEPS[S.bandIndex][S.stepByBand[S.bandIndex]]; S.records[cur.id]=commitInterval(recordFor(cur.id),mm,now()); saveState(); S.revealed=false; S.stepByBand=[2,2,2]; S.pick=null; flash('Scheduled in '+formatMinutes(mm)); }
  else if(e.key===' '){ e.preventDefault(); S.revealed=!S.revealed; render(); }
  else if(e.key==='ArrowRight'){ go(1); }
  else if(e.key==='ArrowLeft'){ go(-1); }
});

render();
/* live forgetting-curve repaint of the memory map */
setInterval(()=>{ if(!S.importOpen) render(); }, 15000);
</script>
