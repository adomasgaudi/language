<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lithuanian finance v0.1.8 — Tartaglia deck</title>
<!--
  Self-contained port of the "language" repo's Tartaglia learning app.
  One file, no build, no network. Teaches the Lithuanian financial terms used
  in the vz repo's Data Explorer (the Įmonės-analizei columns, MONEY_COLS and
  the Finansai sub-tab): apyvarta, spėjamos pajamos, grynasis pelnas, DU
  sąnaudos, …  Learning direction: Lithuanian -> English.

  Engine is faithful to app/src/engine: manual interval slider (cube-root
  bands), heat-coloured memory map, dot->crystal growth, freshness curve,
  localStorage progress with export/import. Audio uses the browser's
  Lithuanian speech synthesis when available (no recordings shipped).
-->
<style>
  :root{
    --bg:#09090b; --panel:rgba(24,24,27,.7); --panel-solid:#18181b;
    --line:#27272a; --line2:#3f3f46;
    --t50:#fafafa; --t100:#f4f4f5; --t200:#e4e4e7; --t300:#d4d4d8;
    --t400:#a1a1aa; --t500:#71717a; --t600:#52525b;
    --sky:#38bdf8; --sky300:#7dd3fc; --sky400:#38bdf8; --sky500:#0ea5e9;
    --rose:#fb7185; --outline:#8b8b93; --knob:#52606e; --knob-edge:#6b7785;
  }
  body.light{
    --bg:#f6f7f9; --panel:rgba(255,255,255,.85); --panel-solid:#ffffff;
    --line:#e2e4e9; --line2:#cdd1d8;
    --t50:#0b0b0d; --t100:#1a1a1f; --t200:#27272a; --t300:#3f3f46;
    --t400:#52525b; --t500:#71717a; --t600:#a1a1aa;
    --sky:#0ea5e9; --sky300:#0284c7; --sky400:#0ea5e9; --sky500:#0ea5e9;
    --rose:#e11d48; --outline:#9aa0ab; --knob:#cbd2da; --knob-edge:#aeb6c0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--t200);
    font:14px/1.45 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  /* margins/gaps halved throughout so the whole UI fits one screen */
  .wrap{max-width:580px;margin:0 auto;display:flex;flex-direction:column;gap:8px;padding:10px 8px 14px;min-height:100%}
  header{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
  h1{font-size:17px;font-weight:700;color:var(--t50);margin:0}
  .sub{font-size:11px;color:var(--t500);margin:1px 0 0}
  .stat{text-align:right;font-size:11px;color:var(--t500);white-space:nowrap}
  .stat .due{font-weight:600;color:var(--sky300)}
  .row{display:flex;flex-wrap:wrap;align-items:center;gap:5px}
  button{font-family:inherit;cursor:pointer;border:0;color:inherit}
  .pill{background:var(--line);color:var(--t300);border-radius:7px;padding:4px 8px;font-size:12px}
  .pill.on{background:var(--sky500);color:#fff}
  .pill:hover{filter:brightness(1.12)}
  .card,.box{border:1px solid var(--line);background:var(--panel);border-radius:14px}
  .card{padding:12px 14px;box-shadow:0 6px 18px rgba(0,0,0,.3)}
  /* prev/next flank the card */
  .cardwrap{display:flex;align-items:stretch;gap:6px}
  .cardcol{flex:1;min-width:0}
  .side{flex:0 0 auto;width:36px;background:var(--line);color:var(--t300);border-radius:10px;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .side:hover{background:var(--line2)} .side:active{transform:scale(.96)}
  .meta{display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:12px;color:var(--t500);margin-bottom:2px}
  .meta .k{text-transform:uppercase;letter-spacing:.04em}
  .acts{display:flex;align-items:center;gap:2px}
  .cardbtn{background:transparent;color:var(--t500);font-size:12px;padding:2px 6px;border-radius:6px}
  .cardbtn:hover{background:var(--line);color:var(--t200)}
  .cardbtn.del:hover{color:var(--rose)}
  .prompt{min-height:64px;padding:6px 0;text-align:center}
  .term{font-size:28px;font-weight:600;line-height:1.15;color:var(--t50)}
  .from{margin-top:3px;font-size:12px;color:var(--t500)}
  .hidden-face{color:var(--t500)}
  .hidden-face .eye{font-size:28px}
  .audio{display:flex;justify-content:center;gap:6px;margin-top:2px}
  .abtn{background:var(--line);color:var(--t200);border-radius:8px;padding:5px 12px;font-size:13px}
  .abtn:hover{background:var(--line2)}
  .answer{margin-top:8px;border-top:1px solid var(--line);padding-top:8px;text-align:center}
  .natural{font-size:18px;color:var(--t100)}
  .literal{font-size:13px;color:var(--t400);margin-top:3px}
  .gloss{font-size:12px;color:var(--t500);margin-top:3px;font-style:italic}
  .show{display:flex;align-items:center;justify-content:center;width:100%;min-height:64px;border:1px solid var(--line2);border-radius:10px;padding:8px 20px;font-size:15px;font-weight:600;color:var(--t300);background:transparent}
  .show:hover{background:var(--line)} .show:active{transform:scale(.99)}
  .slider .top{display:flex;align-items:center;justify-content:space-between;font-size:14px;margin-bottom:4px}
  .slider .val{font-weight:600;color:var(--sky300);font-variant-numeric:tabular-nums}
  .slider .val .due{color:var(--t500);font-weight:400}
  /* three big "slide-to-open" knobs — one per band, crammed close */
  .sliders{display:flex;flex-direction:column;gap:4px;margin:3px 0 8px}
  .srow{display:flex;flex-direction:column;gap:1px;opacity:.6;transition:opacity .2s ease}
  .srow.active{opacity:1}
  .slabel{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;padding:0 4px}
  .sname{color:var(--t500)}
  .srow.active .sname{color:var(--sky300);font-weight:600}
  .schip{font-variant-numeric:tabular-nums;color:var(--t400);font-weight:600}
  .srow.active .schip{color:var(--sky300)}
  input.knob{-webkit-appearance:none;appearance:none;width:100%;height:40px;border-radius:9999px;margin:0;touch-action:none;cursor:grab;
    background:var(--line);border:1px solid var(--line2);outline:none}
  .srow.active input.knob{background:linear-gradient(90deg,rgba(56,189,248,.42),rgba(56,189,248,.10));border-color:var(--sky500)}
  input.knob:active{cursor:grabbing}
  input.knob::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:34px;height:34px;border-radius:9999px;
    background:var(--knob);border:2px solid var(--knob-edge);box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .srow.active input.knob::-webkit-slider-thumb{background:#fff;border-color:var(--sky400)}
  input.knob::-moz-range-thumb{width:34px;height:34px;border:2px solid var(--knob-edge);border-radius:9999px;background:var(--knob);box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .srow.active input.knob::-moz-range-thumb{background:#fff;border-color:var(--sky400)}
  input.knob::-webkit-slider-runnable-track{height:40px;border-radius:9999px;background:transparent}
  input.knob::-moz-range-track{height:40px;border-radius:9999px;background:transparent}
  /* 5 log-interval tick labels under each knob */
  .ticks{display:flex;justify-content:space-between;padding:0 4px;font-size:10px;color:var(--t600);font-variant-numeric:tabular-nums}
  .tick{flex:1;text-align:center}
  .tick:first-child{text-align:left} .tick:last-child{text-align:right}
  .srow.active .tick.on{color:var(--sky300);font-weight:700}
  .tick.on{color:var(--t300);font-weight:600}
  .commit{background:var(--sky500);color:#fff;border-radius:10px;padding:13px;font-size:15px;font-weight:600;width:100%}
  .commit:hover{background:var(--sky400)} .commit:active{transform:scale(.98)}
  .maplabel{font-size:11px;color:var(--t500);margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .sortbtn{background:var(--line);color:var(--t300);border-radius:7px;padding:3px 8px;font-size:11px;font-weight:600;white-space:nowrap}
  .sortbtn:hover{filter:brightness(1.12)}
  .map{display:flex;flex-wrap:wrap;align-items:center;gap:3px;padding:2px 0}
  .dot{position:relative;display:grid;place-items:center;background:transparent}
  .dot .glyph{display:block}
  .dot .crack{position:absolute;pointer-events:none}
  .dot .here{position:absolute;bottom:-4px;width:4px;height:4px;border-radius:9999px;background:var(--sky300)}
  .dot .ring{position:absolute;width:25px;height:25px;border-radius:9999px;border:1.5px solid var(--sky300);box-sizing:border-box;pointer-events:none}
  footer{margin-top:auto;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--t600);padding-top:4px}
  footer button{color:var(--t600);background:transparent}
  footer button:hover{color:var(--t400)}
  .empty{border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:40px;text-align:center;color:var(--t400)}
  textarea{width:100%;height:80px;resize:none;border-radius:6px;background:#0a0a0b;border:1px solid var(--line);color:var(--t200);padding:8px;font-size:12px;font-family:ui-monospace,monospace}
  .apply{margin-top:6px;background:var(--sky500);color:#fff;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600}
  .flash{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--t100);color:#18181b;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .legtoggle{background:transparent;color:var(--t600);font-size:10px;padding:0}
  .legtoggle:hover{color:var(--t400)}
  .legend{font-size:10px;color:var(--t600);line-height:1.5;margin-top:3px}
  .legend b{color:var(--t400);font-weight:600}
  footer .ver{color:var(--t400);font-weight:600;font-variant-numeric:tabular-nums}
  .hist{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:10px 12px;font-size:11px}
  .histhead{color:var(--t400);font-weight:600;margin-bottom:6px}
  .histrow{display:flex;gap:8px;align-items:baseline;padding:2px 0;color:var(--t500)}
  .histrow .hv{color:var(--sky300);font-weight:600;font-variant-numeric:tabular-nums;min-width:42px}
  .histrow .hn{flex:1;color:var(--t400)}
  .histrow .hs{color:var(--t600);white-space:nowrap}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
"use strict";
/* ============================================================================
 * VERSION LOG — one continuous counter, bumped on every update/deploy (vz
 * BULD-02). Newest first; story points = effort, not LOC (BULD-03). The top
 * entry's `v` drives the <title> and the footer badge.
 * ==========================================================================*/
const VERSIONS = [
  {v:'0.1.8', sp:2,   note:'Compact one-view layout: halved margins, prev/next on sides, hide+delete atop card, crammed dots & knobs, collapsible key'},
  {v:'0.1.7', sp:1,   note:'Simplify map to 4 shapes: triangle/hexagon/circle, JWST 4-point star at 1mo+'},
  {v:'0.1.6', sp:4,   note:'3 log-step knobs · sort by due/longevity/topic · light theme · map above card · softer glow · new=outline · full-width Show'},
  {v:'0.1.5', sp:0.5, note:'Sizes 10–15px; ring the current bubble with a 25px circle'},
  {v:'0.1.4', sp:1,   note:'Version badge + 📋 SP history log'},
  {v:'0.1.3', sp:1.5, note:'Remember UI choices in cache across reloads/redeploys'},
  {v:'0.1.2', sp:3,   note:'Memory map: shape = longevity, dimmer glow, 10px cap'},
  {v:'0.1.1', sp:0.5, note:'Cap memory-map dots at 20px'},
  {v:'0.1.0', sp:5,   note:'Lithuanian finance deck — Tartaglia SRS, 34 vz terms'},
];
const VERSION = VERSIONS[0].v;
document.title = 'Lithuanian finance v' + VERSION;

/* ============================================================================
 * CONTENT — Lithuanian financial terms from the vz Data Explorer.
 * [lithuanian, english(natural), literal/note, pronunciation, tier]
 * Tiers: obvious (cognate) | easy | mid | hard
 * ==========================================================================*/
const UNITS = [
  { id:'U1', title:'Pajamos ir apyvarta · Revenue & turnover', cards:[
    ['Apyvarta','turnover (revenue incl. pass-through ad spend)','the dashboard’s "Turnover (apyvarta)"','ah-pih-VAR-tah','mid'],
    ['Pajamos','income / revenue','plural noun, always','pah-YAH-mos','mid'],
    ['Spėjamos pajamos','estimated revenue (fee income)','"Revenue (spėjamos pajamos)" — pass-through excluded','SPAY-yah-mos pah-YAH-mos','hard'],
    ['Pardavimo pajamos','sales revenue','pardavimas = a sale','par-DAH-vih-mo pah-YAH-mos','hard'],
    ['Apyvartos pokytis','turnover change (%)','pokytis = change','ah-pih-VAR-tos POH-kih-tis','mid'],
  ]},
  { id:'U2', title:'Pelnas ir sąnaudos · Profit & costs', cards:[
    ['Pelnas','profit','','PEL-nas','easy'],
    ['Grynasis pelnas','net profit','grynas = pure / net','grih-NAH-sis PEL-nas','mid'],
    ['Nuostoliai','losses','the opposite of pelnas','noo-OST-oh-lyay','hard'],
    ['Sąnaudos','costs / expenses','plural noun','SAW-now-dos','mid'],
    ['DU sąnaudos','wage costs','DU = darbo užmokestis (payroll)','DEH-OO SAW-now-dos','hard'],
    ['Ne-atlyginimų sąnaudos','non-salary costs','ne- = not, atlyginimų = of salaries','neh-at-lih-GIH-nih-moo SAW-now-dos','hard'],
    ['Pelno mokestis','corporate income tax','tax on profit','PEL-no MOH-kes-tis','mid'],
  ]},
  { id:'U3', title:'Atlyginimai ir darbuotojai · Pay & employees', cards:[
    ['Atlyginimas','salary / pay','','at-lih-GIH-nih-mas','mid'],
    ['Atlyginimų vidurkis','average salary','vidurkis = average','at-lih-GIH-nih-moo VEE-door-kis','mid'],
    ['Darbo užmokestis','wages (payroll)','darbas = work','DAR-bo OO-zhmo-kes-tis','hard'],
    ['Darbuotojai','employees','darbuotojas = an employee','dar-boo-OH-toy-yay','mid'],
    ['Darbuotojų skaičius','number of employees','skaičius = number / count','dar-boo-oh-TOH-yoo SKY-choos','mid'],
    ['Vidurkis','average','','VEE-door-kis','easy'],
    ['Pokytis','change (%)','year-on-year delta','POH-kih-tis','easy'],
  ]},
  { id:'U4', title:'Mokesčiai, skolos, rizika · Tax, debt & risk', cards:[
    ['Mokestis','tax','','MOH-kes-tis','easy'],
    ['PVM','VAT','pridėtinės vertės mokestis = value-added tax','PEH-VEH-EM','obvious'],
    ['Skola','debt','','SKOH-lah','easy'],
    ['Skola Sodrai','debt to Sodra (social security)','owed to the state fund','SKOH-lah SOD-rye','mid'],
    ['Sodra','State Social Insurance Fund','the payroll-tax / pension body','SOD-rah','mid'],
    ['Kredito rizika','credit risk','','KREH-dih-to RIH-zih-kah','obvious'],
    ['Rizika','risk','','RIH-zih-kah','obvious'],
    ['Įmonė','company','','im-oh-NEH','easy'],
    ['Metai','year','plural form','MEH-tye','easy'],
    ['Veikla','activity / line of business','what the firm does','VAYK-lah','mid'],
  ]},
  { id:'U5', title:'Rizikos lygiai · Credit-risk levels', cards:[
    ['Žemiausia','lowest','best credit standing','zheh-MYOW-sya','hard'],
    ['Žema','low','','ZHEH-mah','mid'],
    ['Vidutinė','medium','','vih-doo-TIH-neh','mid'],
    ['Aukšta','high','','OWK-shtah','mid'],
    ['Aukščiausia','highest','worst credit standing','owk-SHCHOW-sya','hard'],
  ]},
];

/* Flatten into cards. */
const CARDS = [];
UNITS.forEach(u => u.cards.forEach((c, i) => {
  CARDS.push({
    id: u.id + '-' + (i+1),
    unit: u.title,
    target: c[0], natural: c[1], literal: c[2], gloss: c[3], tier: c[4],
  });
}));

/* ============================================================================
 * ENGINE — manual SRS (ported from app/src/engine/srs.ts & interval.ts)
 * ==========================================================================*/
const MINUTE_MS = 60000;
const now = () => Date.now();
const clamp = (x,lo,hi)=> x<lo?lo : x>hi?hi : x;
const cbrt = Math.cbrt;

function newRecord(){ return {status:'new',due:0,last:null,interval:0,reps:0,lapses:0}; }
function isDue(r,t){ return r.status==='new' || t>=r.due; }
function statusAt(r,t){ return r.last===null ? 'new' : (t>=r.due?'due':'scheduled'); }
function commitInterval(r,minutes,t){
  const interval = Math.max(0,minutes);
  const wasOverdue = r.last!==null && t>=r.due;
  return {status:'scheduled',last:t,due:t+interval*MINUTE_MS,interval,reps:r.reps+1,lapses:r.lapses+(wasOverdue?1:0)};
}
function freshness(r,t){
  if(r.last===null || r.interval<=0) return 0;
  const f = 1 - (t-r.last)/(r.interval*MINUTE_MS);
  return f<0?0:f>1?1:f;
}

const BANDS = [
  {id:'short',label:'minutes',lo:0.5,hi:30},
  {id:'mid',label:'hours',lo:10,hi:2880},
  {id:'long',label:'days',lo:1440,hi:43200},
];
// Each knob snaps to 5 fixed, log-spaced intervals (no free choice) so reviews
// land on predictable times instead of scattering randomly. 3 knobs × 5 = 15 stops.
const STEPS=5;
const BAND_STEPS = BANDS.map(b=>{
  const lo=Math.log(b.lo), hi=Math.log(b.hi), out=[];
  for(let i=0;i<STEPS;i++) out.push(Math.exp(lo+(hi-lo)*i/(STEPS-1)));
  return out;
});
function formatMinutes(m){
  if(m<1) return Math.round(m*60)+'s';
  if(m<60) return Math.round(m)+'m';
  if(m<1440){ const h=m/60; return (h<10?h.toFixed(h%1?1:0):Math.round(h))+'h'; }
  const d=m/1440; return (d<10?d.toFixed(d%1?1:0):Math.round(d))+'d';
}
function dueLabel(m,t){
  const due=new Date(t+m*MINUTE_MS), sameDay=new Date(t).toDateString()===due.toDateString();
  return sameDay
    ? due.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
    : due.toLocaleDateString([], {month:'short',day:'numeric'});
}

/* memory map.
 *   COLOUR  = freshness (forgetting curve): bright blue just-reviewed -> white
 *             -> orange -> coal as it fades.
 *   SHAPE   = longevity / interval band, simplified to four:
 *             triangle <30m · hexagon <2d · circle <1mo · 4-point star 1mo+.
 *   SIZE    = position within the band, 10px (just entered) -> 15px. */
const SIZE_MIN=10, SIZE_MAX=15;
const GLOW_AT=0.78; // freshest shapes carry a soft glow — some shine, not the old halo
const HEAT=[[1,[77,166,255]],[0.8,[235,245,255]],[0.6,[255,214,92]],[0.4,[255,138,30]],[0.2,[229,57,53]],[0,[58,42,42]]];

// Longevity bands, smallest interval first.
const SHAPE_BANDS=[
  {shape:'triangle', lo:0,     hi:30},      // up to 30 min
  {shape:'hexagon',  lo:30,    hi:2880},    // 30 min – 2 d
  {shape:'circle',   lo:2880,  hi:43200},   // 2 d – 1 mo
  {shape:'star',     lo:43200, hi:Infinity},// 1 mo +  (JWST-style 4-point star)
];
function bandFor(m){
  for(const b of SHAPE_BANDS) if(m<b.hi) return b;
  return SHAPE_BANDS[SHAPE_BANDS.length-1];
}
// 5px at the band's low edge -> 10px at its high edge (cube-root spaced).
function bandSize(b,m){
  const L=b.lo<=0?0.5:b.lo;
  const H=(b.hi===Infinity)?L*64:b.hi;
  const span=cbrt(H)-cbrt(L);
  const t=span<=0?1:clamp((cbrt(Math.max(m,L))-cbrt(L))/span,0,1);
  return SIZE_MIN+(SIZE_MAX-SIZE_MIN)*t;
}
function heatColor(f){
  const x=clamp(f,0,1);
  for(let i=0;i<HEAT.length-1;i++){
    const [hi,chi]=HEAT[i], [lo,clo]=HEAT[i+1];
    if(x<=hi && x>=lo){
      const t=hi===lo?0:(x-lo)/(hi-lo);
      const r=Math.round(clo[0]+(chi[0]-clo[0])*t), g=Math.round(clo[1]+(chi[1]-clo[1])*t), b=Math.round(clo[2]+(chi[2]-clo[2])*t);
      return `rgb(${r}, ${g}, ${b})`;
    }
  }
  const last=HEAT[HEAT.length-1][1]; return `rgb(${last[0]}, ${last[1]}, ${last[2]})`;
}
// CSS clip-path for a regular N-gon, point up.
function polyClip(sides){
  const pts=[];
  for(let i=0;i<sides;i++){
    const a=-Math.PI/2 + i*2*Math.PI/sides;
    pts.push((50+50*Math.cos(a)).toFixed(2)+'% '+(50+50*Math.sin(a)).toFixed(2)+'%');
  }
  return 'polygon('+pts.join(', ')+')';
}
// 4-point sparkle (JWST-style): outer points up/right/down/left, thin inner waist.
function starClip(){
  const R=50, r=13, pts=[];
  for(let i=0;i<8;i++){
    const a=-Math.PI/2 + i*Math.PI/4, rad=(i%2===0)?R:r;
    pts.push((50+rad*Math.cos(a)).toFixed(2)+'% '+(50+rad*Math.sin(a)).toFixed(2)+'%');
  }
  return 'polygon('+pts.join(', ')+')';
}
// Resolve a band's shape name to a CSS clip-path ('' => plain circle).
function clipFor(shape){
  if(shape==='triangle') return polyClip(3);
  if(shape==='hexagon')  return polyClip(6);
  if(shape==='star')     return starClip();
  return ''; // circle
}
function dotStyle(rec,t){
  const isNew=rec.status==='new';
  const f=freshness(rec,t);
  const due=!isNew && t>=rec.due;
  const b=bandFor(rec.interval);
  return {
    shape:b.shape, clip:clipFor(b.shape),
    diameter:bandSize(b,rec.interval), color:heatColor(f),
    isNew,                       // new = hollow outline, no fill
    due, glow:!isNew && f>=GLOW_AT,
  };
}

/* ============================================================================
 * STORAGE
 * ==========================================================================*/
// Stable key — kept the same across app updates so your progress and choices
// survive every redeploy. Card IDs (U1-1, …) are stable too, so reviews stick.
const KEY='lt-finance-tartaglia-v1';
const FMT='ltfin1';
function loadState(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){
      const o=JSON.parse(raw);
      return {
        records:o.records||{}, deleted:o.deleted||[], purged:o.purged||[],
        // remembered UI choices
        freeScroll:!!o.freeScroll, hideTarget:!!o.hideTarget,
        bandIndex:Number.isInteger(o.bandIndex)?o.bandIndex:1,
        sortMode:['due','longevity','topic'].includes(o.sortMode)?o.sortMode:'due',
        theme:o.theme==='light'?'light':'dark',
      };
    }
  }catch(e){}
  return {records:{},deleted:[],purged:[],freeScroll:false,hideTarget:false,bandIndex:1,sortMode:'due',theme:'dark'};
}
function saveState(){
  try{
    localStorage.setItem(KEY,JSON.stringify({
      records:S.records, deleted:S.deleted, purged:S.purged,
      freeScroll:S.freeScroll, hideTarget:S.hideTarget, bandIndex:S.bandIndex,
      sortMode:S.sortMode, theme:S.theme,
    }));
  }catch(e){}
}
function recordFor(id){ return S.records[id] || (S.records[id]=newRecord()); }

/* ============================================================================
 * AUDIO — Lithuanian TTS when the platform offers it.
 * ==========================================================================*/
function speak(text){
  if(!('speechSynthesis' in window)){ flash('No speech support on this device'); return; }
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='lt-LT'; u.rate=0.9;
    const v=(window.speechSynthesis.getVoices()||[]).find(v=>/lt/i.test(v.lang));
    if(v) u.voice=v;
    else flash('No Lithuanian voice installed — using default');
    window.speechSynthesis.speak(u);
  }catch(e){ flash('Could not play audio'); }
}
if('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged=()=>{};

/* ============================================================================
 * APP STATE + RENDER
 * ==========================================================================*/
// Defaults first (transient view state), then overlay the remembered values so
// persisted choices win.
const S = Object.assign({
  idx:0, revealed:false, stepByBand:[2,2,2], importOpen:false, importText:'', histOpen:false, legendOpen:false, flashMsg:null, flashTimer:null,
  deleted:[], purged:[],
}, loadState());

function visibleCards(){ return CARDS.filter(c=>!S.deleted.includes(c.id) && !S.purged.includes(c.id)); }
function dueCards(t){ return visibleCards().filter(c=>isDue(recordFor(c.id),t)); }
function pool(t){ return S.freeScroll ? visibleCards() : dueCards(t); }
function current(t){ const p=pool(t); if(!p.length) return null; if(S.idx>=p.length) S.idx=0; if(S.idx<0) S.idx=p.length-1; return p[S.idx]; }

// Order for the memory map. due: soonest-due first (new cards count as due now);
// longevity: shortest interval first; topic: original unit/deck order.
function sortCards(cards,t){
  const arr=cards.slice();
  if(S.sortMode==='due') arr.sort((a,b)=>dueKey(recordFor(a.id),t)-dueKey(recordFor(b.id),t));
  else if(S.sortMode==='longevity') arr.sort((a,b)=>recordFor(a.id).interval-recordFor(b.id).interval);
  // 'topic' keeps CARDS' natural unit order
  return arr;
}
function dueKey(rec,t){ return rec.status==='new' ? t : rec.due; }

function flash(msg){
  S.flashMsg=msg; render();
  if(S.flashTimer) clearTimeout(S.flashTimer);
  S.flashTimer=setTimeout(()=>{ S.flashMsg=null; render(); },2000);
}

function el(tag,props,...kids){
  const n=document.createElement(tag);
  if(props) for(const k in props){
    if(k==='style' && typeof props[k]==='object') Object.assign(n.style,props[k]);
    else if(k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(),props[k]);
    else if(k==='class') n.className=props[k];
    else if(k==='html') n.innerHTML=props[k];
    else n.setAttribute(k,props[k]);
  }
  for(const kid of kids.flat()) if(kid!=null && kid!==false) n.append(kid.nodeType?kid:document.createTextNode(kid));
  return n;
}

function render(){
  const t=now();
  document.body.className = S.theme==='light' ? 'light' : '';
  const app=document.getElementById('app');
  app.innerHTML='';
  const cur=current(t);
  const due=dueCards(t).length;
  const vis=visibleCards();

  /* header */
  app.append(el('header',null,
    el('div',null,
      el('h1',null,'Lithuanian finance'),
      el('p',{class:'sub'},'vz Data Explorer terms · LT → EN · manual SRS'),
    ),
    el('div',{class:'stat'},
      el('div',{class:'due'}, due+' due'),
      el('div',null, vis.length+' cards'),
    ),
  ));

  /* settings row */
  app.append(el('div',{class:'row'},
    el('button',{class:'pill'+(S.freeScroll?' on':''),onclick:()=>{S.freeScroll=!S.freeScroll;S.idx=0;saveState();render();}}, S.freeScroll?'Free scroll: on':'Free scroll: off'),
    el('button',{class:'pill'+(S.hideTarget?' on':''),onclick:()=>{S.hideTarget=!S.hideTarget;saveState();render();}}, S.hideTarget?'Audio: hidden':'Audio: shown'),
    el('button',{class:'pill'+(S.theme==='light'?' on':''),onclick:()=>{S.theme=S.theme==='light'?'dark':'light';saveState();render();}}, S.theme==='light'?'☀ Light':'🌙 Dark'),
    el('button',{class:'pill',onclick:doExport},'Export'),
    el('button',{class:'pill',onclick:()=>{S.importOpen=!S.importOpen;render();}},'Import'),
    el('button',{class:'pill',onclick:()=>{ if(confirm('Reset all progress?')){S.records={};S.deleted=[];S.purged=[];S.idx=0;saveState();render();} }},'Reset'),
  ));

  if(S.importOpen){
    const ta=el('textarea',{placeholder:'Paste a backup string…'}); ta.value=S.importText;
    ta.addEventListener('input',e=>S.importText=e.target.value);
    app.append(el('div',{class:'box',style:{padding:'8px'}}, ta,
      el('button',{class:'apply',onclick:doImport},'Apply')));
  }

  /* memory map — above the card */
  app.append(buildMap(cur,t,vis));

  /* card flanked by prev / next; hide & delete sit at the card top */
  const prevBtn=el('button',{class:'side',title:'Previous',onclick:()=>{S.idx--;S.revealed=false;render();}},'‹');
  const nextBtn=el('button',{class:'side',title:'Next',onclick:()=>{S.idx++;S.revealed=false;render();}},'›');
  let cardEl;
  if(cur){
    const rec=recordFor(cur.id);
    const metaRight = rec.reps>0
      ? formatMinutes(rec.interval)+' · '+new Date(rec.due).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
      : 'new';
    const hide=()=>{ if(!S.deleted.includes(cur.id))S.deleted.push(cur.id); S.idx=0; S.revealed=false; saveState(); render(); };
    const del=()=>{ if(!S.purged.includes(cur.id))S.purged.push(cur.id); S.idx=0; S.revealed=false; saveState(); render(); };
    cardEl=el('div',{class:'card'},
      el('div',{class:'meta'},
        el('span',{class:'k'}, cur.tier+' · '+metaRight),
        el('div',{class:'acts'},
          el('button',{class:'cardbtn',title:'Hide (restorable)',onclick:hide},'🙈 Hide'),
          el('button',{class:'cardbtn del',title:'Delete (gone until reset)',onclick:del},'🗑 Delete'),
        ),
      ),
      el('div',{class:'prompt'},
        S.hideTarget
          ? el('div',{class:'hidden-face'}, el('div',{class:'eye'},'🙈'), el('div',{style:{marginTop:'4px',fontSize:'13px'}},'Listen & guess — Lithuanian hidden'))
          : el('div',{class:'term'}, cur.target),
        (!S.hideTarget) ? el('div',{class:'from'}, cur.unit.split(' · ')[0]) : null,
      ),
      el('div',{class:'audio'},
        el('button',{class:'abtn',onclick:()=>speak(cur.target)},'🔊 Say it'),
      ),
      el('div',{class:'answer'},
        S.revealed
          ? el('div',null,
              el('div',{class:'natural'}, cur.natural),
              cur.literal ? el('div',{class:'literal'}, cur.literal) : null,
              el('div',{class:'gloss'}, '['+cur.gloss+']'),
            )
          : el('button',{class:'show',onclick:()=>{S.revealed=true;render();}},'Show meaning'),
      ),
    );
  } else {
    cardEl=el('div',{class:'empty'}, '🎉 Nothing due. Turn on free scroll to browse.');
  }
  app.append(el('div',{class:'cardwrap'}, prevBtn, el('div',{class:'cardcol'}, cardEl), nextBtn));

  /* review control — three big knobs, one per band; each snaps to 5 log steps.
     The last-touched knob is the active choice. */
  if(cur){
    const chosen=()=>BAND_STEPS[S.bandIndex][S.stepByBand[S.bandIndex]];
    // switch active band & repaint tick highlight without a full re-render (keeps a drag alive)
    const setActive=(i)=>{ S.bandIndex=i; document.querySelectorAll('.srow').forEach((row,j)=>row.classList.toggle('active',j===i)); paintRow(i); refreshHead(); };
    const paintRow=(i)=>{ document.querySelectorAll('#ticks'+i+' .tick').forEach((tk,j)=>tk.classList.toggle('on',j===S.stepByBand[i])); };
    const refreshHead=()=>{ const mm=chosen(); const v=document.querySelector('.slider .val'); if(v) v.innerHTML=formatMinutes(mm)+' <span class="due">· '+dueLabel(mm,now())+'</span>'; };
    const rows = BANDS.map((b,i)=>{
      const r=el('input',{type:'range',min:'0',max:String(STEPS-1),step:'1','aria-label':b.label+' interval',class:'knob'});
      r.value=String(S.stepByBand[i]);
      r.addEventListener('pointerdown',()=>{ if(S.bandIndex!==i) setActive(i); });
      r.addEventListener('input',e=>{
        S.stepByBand[i]=Number(e.target.value);
        if(S.bandIndex!==i) setActive(i); else { paintRow(i); refreshHead(); }
      });
      r.addEventListener('change',()=>saveState());
      const ticks=el('div',{class:'ticks',id:'ticks'+i},
        BAND_STEPS[i].map((m,j)=>el('span',{class:'tick'+(j===S.stepByBand[i]?' on':'')}, formatMinutes(m))));
      return el('div',{class:'srow'+(i===S.bandIndex?' active':'')},
        el('div',{class:'slabel'}, el('span',{class:'sname'}, b.label)),
        r, ticks,
      );
    });
    const mNow=chosen();
    app.append(el('div',{class:'card slider'},
      el('div',{class:'top'},
        el('span',{style:{color:'var(--t400)'}},'Next review in'),
        el('span',{class:'val'}, formatMinutes(mNow)+' ', el('span',{class:'due'}, '· '+dueLabel(mNow,t))),
      ),
      el('div',{class:'sliders'}, rows),
      el('button',{class:'commit',onclick:()=>{
        const mm=chosen();
        S.records[cur.id]=commitInterval(recordFor(cur.id),mm,now());
        saveState(); S.revealed=false; S.stepByBand=[2,2,2];
        flash('Scheduled in '+formatMinutes(mm));
      }},'Commit ↵'),
    ));
  }

  function buildMap(cur,t,vis){
  const map=el('div',{class:'map'});
  const sorted=sortCards(vis,t);
  sorted.forEach(c=>{
    const rec=recordFor(c.id), s=dotStyle(rec,t), isCur=cur&&c.id===cur.id;
    const size=Math.max(s.diameter, isCur?25:14); // tap target; fit the 25px ring when current
    const glyph=el('span',{class:'glyph'});
    Object.assign(glyph.style,{
      position:'relative',
      width:s.diameter+'px', height:s.diameter+'px', display:'block',
      // new cards: hollow outline (no fill); others: heat-colour fill
      background:s.isNew?'var(--outline)':s.color,
      clipPath:s.clip||'none', WebkitClipPath:s.clip||'none',
      borderRadius:s.shape==='circle'?'9999px':'1px',
      // a little shine back: soft drop-shadow when fresh (less than the old halo)
      filter:s.glow?`drop-shadow(0 0 4px ${s.color})`:'none',
      opacity:s.due?0.45:1, // faded when due, otherwise full
      transition:'background-color .6s ease, filter .6s ease, opacity .6s ease, transform .2s ease',
    });
    if(s.isNew){
      // punch a same-shape hole so the new card reads as an outline only
      const hole=el('span');
      Object.assign(hole.style,{
        position:'absolute', left:'50%', top:'50%', transform:'translate(-50%,-50%)',
        width:Math.max(s.diameter-3,2)+'px', height:Math.max(s.diameter-3,2)+'px',
        background:'var(--bg)', clipPath:s.clip||'none', WebkitClipPath:s.clip||'none',
        borderRadius:s.shape==='circle'?'9999px':'1px',
      });
      glyph.append(hole);
    }
    const btn=el('button',{class:'dot',title:c.target+' · '+s.shape+' · '+(s.due?'due':statusAt(rec,t)),style:{width:size+'px',height:size+'px'},
      onclick:()=>{ const p=pool(t); const i=p.findIndex(x=>x.id===c.id); if(i>=0){S.idx=i; S.revealed=false; render();} else flash('Hidden — in free scroll only'); }},
      glyph);
    if(isCur) btn.append(el('span',{class:'ring'})); // 25px circle marks the card on screen
    map.append(btn);
  });
  const SORT_LABEL={due:'due date',longevity:'longevity',topic:'topic'};
  const SORT_NEXT={due:'longevity',longevity:'topic',topic:'due'};
  return el('div',null,
    el('div',{class:'maplabel'},
      el('span',null,'Memory map — colour = freshness · shape = longevity'),
      el('button',{class:'sortbtn',onclick:()=>{S.sortMode=SORT_NEXT[S.sortMode];saveState();render();}}, 'Sort: '+SORT_LABEL[S.sortMode]),
    ),
    map);
  }

  /* legend (collapsed by default to keep one-view) + footer */
  app.append(el('div',null,
    el('button',{class:'legtoggle',onclick:()=>{S.legendOpen=!S.legendOpen;render();}}, (S.legendOpen?'▾':'▸')+' key'),
    S.legendOpen ? el('div',{class:'legend',html:
      '<b>How to use:</b> read the term, guess, hit <b>Show meaning</b>, pick an interval, <b>Commit</b>. '+
      '<b>New cards</b> are a hollow outline; reviewed ones fill and heat from blue (fresh) → orange → coal as they fade. '+
      'Shape = longevity: △ &lt;30m · ⬡ &lt;2d · ○ &lt;1mo · ✦ 1mo+. Faded = due. Each knob snaps to 5 log intervals.'}) : null,
  ));

  app.append(el('footer',null,
    el('span',null,
      el('span',{class:'ver'},'v'+VERSION), ' · ',
      el('button',{onclick:()=>{S.histOpen=!S.histOpen;render();}},'📋 history'),
    ),
    S.deleted.length>0 ? el('button',{onclick:()=>{S.deleted=[];saveState();render();}},'Restore '+S.deleted.length+' hidden') : el('span',null,''),
  ));

  if(S.histOpen){
    app.append(el('div',{class:'hist'},
      el('div',{class:'histhead'},'Version history · '+VERSIONS.reduce((a,e)=>a+e.sp,0)+' sp total'),
      VERSIONS.map(e=>el('div',{class:'histrow'},
        el('span',{class:'hv'},'v'+e.v),
        el('span',{class:'hn'}, e.note),
        el('span',{class:'hs'}, e.sp+' sp'),
      )),
    ));
  }

  if(S.flashMsg) app.append(el('div',{class:'flash'}, S.flashMsg));
}

function doExport(){
  const s=FMT+':'+btoa(unescape(encodeURIComponent(JSON.stringify({records:S.records,deleted:S.deleted}))));
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(s).then(()=>flash('Progress copied to clipboard'),()=>{S.importText=s;S.importOpen=true;flash('Copy this backup string');});
  } else { S.importText=s; S.importOpen=true; flash('Copy this backup string'); }
}
function doImport(){
  const s=S.importText.trim();
  try{
    if(!s.startsWith(FMT+':')) throw 0;
    const o=JSON.parse(decodeURIComponent(escape(atob(s.slice(FMT.length+1)))));
    S.records=o.records||{}; S.deleted=o.deleted||[]; saveState();
    S.importOpen=false; S.importText=''; S.idx=0; flash('Progress imported');
  }catch(e){ flash('Import failed — incompatible string'); }
}

/* keyboard: Enter commits, Space reveals */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA') return;
  const cur=current(now()); if(!cur) return;
  if(e.key==='Enter'){ const mm=BAND_STEPS[S.bandIndex][S.stepByBand[S.bandIndex]]; S.records[cur.id]=commitInterval(recordFor(cur.id),mm,now()); saveState(); S.revealed=false; S.stepByBand=[2,2,2]; flash('Scheduled in '+formatMinutes(mm)); }
  else if(e.key===' '){ e.preventDefault(); S.revealed=!S.revealed; render(); }
  else if(e.key==='ArrowRight'){ S.idx++; S.revealed=false; render(); }
  else if(e.key==='ArrowLeft'){ S.idx--; S.revealed=false; render(); }
});

render();
/* live forgetting-curve repaint of the memory map */
setInterval(()=>{ if(!S.importOpen) render(); }, 15000);
</script>
